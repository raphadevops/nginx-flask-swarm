services:
  backend:
    image: nginx-flask-swarm-backend:latest
    environment:
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_NAME=flaskdb
      - DB_USER=flask
    secrets:
      - db_password
    networks:
      - app_network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=flaskdb
      - POSTGRES_USER=flask
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure
        max_attempts: 3
networks:
  app_network:
    driver: overlay

volumes:
  postgres_data:

secrets:
  db_password:
    external: true