version: "3.8"

services:
  backend:
    image: nginx-flask-swarm-backend:latest
    environment:
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_NAME=flaskdb
      - DB_USER=flask
      - DB_PASSWORD=flask123
    networks:
      - app_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=flaskdb
      - POSTGRES_USER=flask
      - POSTGRES_PASSWORD=flask123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app_network:
    driver: overlay

volumes:
  postgres_data: