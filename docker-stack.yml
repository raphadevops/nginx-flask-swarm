version: "3.8"

services:
  backend:
    image: nginx-flask-swarm-backend:latest
    environment:
      - ENVIRONMENT=production
    networks:
      - app_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app_network:
    driver: overlay